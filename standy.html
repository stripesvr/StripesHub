<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standy Mods</title>
    <style>
        /* --- GLOBAL STYLES --- */
        body {
            background-color: #0d0d11;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 60px 20px;
            box-sizing: border-box;
        }

        /* --- GLOWING TYPEWRITER EFFECT --- */
        .title-container {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 50px;
        }

        .typewriter-text {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.8), 
                         0 0 20px rgba(255, 51, 51, 0.6);
            letter-spacing: 2px;
            border-right: 3px solid #ff3333;
            white-space: nowrap;
            background: transparent;
            padding-right: 4px;
            animation: blink 0.75s step-end infinite;
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: #ff3333; }
        }

        /* --- BUTTONS CONTAINER --- */
        .links-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- EDITABLE BUTTON STYLES --- */
        .card-link {
            background: linear-gradient(135deg, #16161f 0%, #1f1f2e 100%);
            border: 1px solid #33334d;
            border-radius: 12px;
            padding: 15px 20px;
            text-decoration: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card-link:hover {
            transform: translateY(-3px);
            border-color: #ff3333;
            box-shadow: 0 6px 20px rgba(255, 51, 51, 0.2);
        }

        .btn-name {
            font-size: 1.25rem;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 5px;
        }

        .btn-description {
            font-size: 0.9rem;
            color: #b0b0bc;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="title-container">
        <div class="typewriter-text" id="typewriter"></div>
    </div>

    <div class="links-container">

        <a href="xere1.apk" download class="card-link">
            <span class="btn-name">Standy Mods</span>
            <span class="btn-description">The Install For Standy Mod Apk</span>
        </a>
        
        <a href="https://threethan.itch.io/lightning-launcher" download class="card-link">
            <span class="btn-name">Lightning Launcher</span>
            <span class="btn-description">The ADB Bypass Method APK #1</span>
        </a>
        
        <a href="https://github.com/petermg/TheOcularMigraineMCP/releases" download class="card-link">
            <span class="btn-name">Ocular Migraine</span>
            <span class="btn-description">The ADB Bypass Method APK #2</span>
        </a>

    </div>

    <script>
        // --- EDIT YOUR TITLE HERE ---
        // Change "Untitled" to whatever you want. You can add more phrases separated by commas.
        const textArray = ["Standy Mods"]; 
        
        let textIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typeSpeed = 150;  
        const eraseSpeed = 100; 
        const delayBetween = 2500; 
        const typewriterElement = document.getElementById("typewriter");

        function type() {
            const currentText = textArray[textIndex];
            
            if (isDeleting) {
                typewriterElement.textContent = currentText.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typewriterElement.textContent = currentText.substring(0, charIndex + 1);
                charIndex++;
            }

            let nextActionSpeed = isDeleting ? eraseSpeed : typeSpeed;

            if (!isDeleting && charIndex === currentText.length) {
                nextActionSpeed = delayBetween; 
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                textIndex = (textIndex + 1) % textArray.length; // Moves to next text if you add more
                nextActionSpeed = 500; 
            }

            setTimeout(type, nextActionSpeed);
        }

        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(type, 500);
        });
    </script>

</body>
</html>
