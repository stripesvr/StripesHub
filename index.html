<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StripesVR Homepage</title>
    <style>
        /* --- GLOBAL & DANCING STYLES --- */
        :root {
            --beat-glow: 0px;
            --beat-scale: 1;
            --beat-color-pulse: #0d0d11;
        }

        body {
            background-color: var(--beat-color-pulse);
            background-image: radial-gradient(circle at center, rgba(255, 51, 51, 0.15) 0%, transparent 70%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            transition: background-color 0.02s ease;
            overflow-x: hidden;
        }

        /* --- BLUR EFFECT WRAPPER --- */
        .main-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: blur(20px);
            transition: filter 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
        }

        .main-content.active {
            filter: blur(0px);
            pointer-events: auto;
        }

        /* --- CLICK TO ENTER OVERLAY --- */
        .enter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(13, 13, 17, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .enter-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .enter-text {
            font-size: 2rem;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.9), 
                         0 0 30px rgba(255, 51, 51, 0.5);
            animation: pulseText 2s infinite ease-in-out;
        }

        @keyframes pulseText {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        /* --- PROFILE IMAGE WITH INDEPENDENT DANCE ANIMATION --- */
        .profile-pic {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border: 4px solid #ff3333;
            box-shadow: 0 0 calc(20px + var(--beat-glow)) rgba(255, 51, 51, 0.6);
            margin-bottom: 20px;
            transform: scale(var(--beat-scale));
            transition: transform 0.02s ease, box-shadow 0.02s ease;
        }

        .main-content.active .profile-pic {
            animation: borderDance 0.3s infinite alternate linear;
        }

        @keyframes borderDance {
            0% { border-radius: 50% 50% 50% 50%; }
            33% { border-radius: 40% 60% 43% 57% / 57% 45% 55% 43%; }
            66% { border-radius: 58% 42% 54% 46% / 44% 56% 44% 56%; }
            100% { border-radius: 46% 54% 40% 60% / 53% 47% 53% 47%; }
        }

        /* --- GLOWING TYPEWRITER EFFECT --- */
        .title-container {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .typewriter-text {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 calc(10px + (var(--beat-glow) / 2)) rgba(255, 51, 51, 0.8), 
                         0 0 calc(20px + var(--beat-glow)) rgba(255, 51, 51, 0.6);
            letter-spacing: 2px;
            border-right: 3px solid #ff3333;
            white-space: nowrap;
            background: transparent;
            padding-right: 4px;
            animation: blink 0.75s step-end infinite;
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: #ff3333; }
        }

        /* --- BUTTONS CONTAINER --- */
        .links-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .card-link {
            background: linear-gradient(135deg, #16161f 0%, #1f1f2e 100%);
            border: 1px solid #33334d;
            border-radius: 12px;
            padding: 15px 20px;
            text-decoration: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card-link:hover {
            transform: translateY(-3px);
            border-color: #ff3333;
            box-shadow: 0 6px 20px rgba(255, 51, 51, 0.3);
        }

        .btn-name {
            font-size: 1.25rem;
            font-weight: bold;
            color: #ff4d4d;
            margin-bottom: 5px;
        }

        .btn-description {
            font-size: 0.9rem;
            color: #b0b0bc;
            line-height: 1.4;
        }

        .counter-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }

        .counter-label {
            font-size: 1rem;
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.6);
            margin-bottom: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <audio id="bg-audio" crossorigin="anonymous"></audio>

    <div class="enter-overlay" id="overlay-screen">
        <div class="enter-text" id="enter-status">Click to Enter...</div>
    </div>

    <div class="main-content" id="site-content">
        <img src="151.png" alt="StripesVR Profile Picture" class="profile-pic">

        <div class="title-container">
            <div class="typewriter-text" id="typewriter"></div>
        </div>

        <div class="links-container">
            <a href="https://stripesvr.neocities.org/frida" class="card-link">
                <span class="btn-name">Frida Tools</span>
                <span class="btn-description">Needed For Every Mod In Here!</span>
            </a>
        
            <a href="https://stripesvr.neocities.org/moddingtutorial1" class="card-link">
                <span class="btn-name">Cyber.exe Tutorial</span>
                <span class="btn-description">All Of The Downloads And Links Needed For The Cyber.exe Mod Menu</span>
            </a>

            <a href="https://stripesvr.neocities.org/Moddingtutorial2" class="card-link">
                <span class="btn-name">N5 Menu Tutorial</span>
                <span class="btn-description">All The Downloads Needed For The N5 Modding Tutorial</span>
            </a>
        </div>

        <div class="counter-container">
            <div class="counter-label"></div>
            <iframe src="https://404city.neocities" 
                    width="0" 
                    height="0" 
                    frameborder="0" 
                    scrolling="no" 
                    style="display: none">
            </iframe>
        </div>
    </div>

    <script>
        // --- TYPEWRITER EFFECT ---
        const textArray = ["StripesVR"];
        let textIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typeSpeed = 150;  
        const eraseSpeed = 100; 
        const delayBetween = 2500; 
        const typewriterElement = document.getElementById("typewriter");

        function type() {
            const currentText = textArray[textIndex];
            if (isDeleting) {
                typewriterElement.textContent = currentText.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typewriterElement.textContent = currentText.substring(0, charIndex + 1);
                charIndex++;
            }

            let nextActionSpeed = isDeleting ? eraseSpeed : typeSpeed;

            if (!isDeleting && charIndex === currentText.length) {
                nextActionSpeed = delayBetween; 
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                nextActionSpeed = 500; 
            }
            setTimeout(type, nextActionSpeed);
        }

        // --- DYNAMIC AUDIO PIPELINE ---
        let audioCtx, analyser, dataArray, sourceNode;
        let isPlaying = true;
        const audio = document.getElementById('bg-audio');
        
        // Added a public CORS proxy helper prefix to bypass the GitHub domain block
        const rawSongUrl = 'https://raw.githubusercontent.com/thatguyvrgt/Music1/main/vyralphonk.mp3';
        const songUrl = 'https://corsproxy.io/?' + encodeURIComponent(rawSongUrl);

        function setupAndPlayAudio() {
            try {
                audio.src = songUrl;
                audio.loop = true;

                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContextClass();
                analyser = audioCtx.createAnalyser();
                
                analyser.fftSize = 32; 
                
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                sourceNode = audioCtx.createMediaElementSource(audio);
                sourceNode.connect(analyser);
                analyser.connect(audioCtx.destination);

                audio.play().then(() => {
                    isPlaying = true;
                    animateDance();
                }).catch(err => {
                    console.error("Playback failed:", err);
                });

            } catch (err) {
                console.error("Audio pipeline initialization error:", err);
            }
        }

        function animateDance() {
            requestAnimationFrame(animateDance);
            if (!isPlaying) return;

            analyser.getByteFrequencyData(dataArray);
            
            let lowBass = dataArray[1] || 0; 
            let midBass = dataArray[2] || 0;
            let upperMids = dataArray[4] || 0; 
            
            let rawAudioValue = Math.max(lowBass, midBass, upperMids);
            
            let sensitivityMultiplier = 1.7; // Highly sensitive beat calculation
            let finalValue = Math.min(255, rawAudioValue * sensitivityMultiplier);
            
            let glowIntensity = (finalValue / 255) * 85; 
            let scaleMultiplier = 1 + ((finalValue / 255) * 0.25); 
            
            let redShift = Math.floor(13 + (finalValue / 255) * 70);
            let colorPulse = `rgb(${redShift}, 13, 17)`;

            document.documentElement.style.setProperty('--beat-glow', `${glowIntensity}px`);
            document.documentElement.style.setProperty('--beat-scale', scaleMultiplier);
            document.documentElement.style.setProperty('--beat-color-pulse', colorPulse);
        }

        // --- OVERLAY ENTRY HANDLER ---
        const overlay = document.getElementById('overlay-screen');
        const siteContent = document.getElementById('site-content');
        const enterStatus = document.getElementById('enter-status');

        overlay.addEventListener('click', () => {
            enterStatus.textContent = "Loading Track...";
            
            overlay.classList.add('hidden');
            siteContent.classList.add('active');

            setupAndPlayAudio();
        });

        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(type, 500);
        });
    </script>
</body>
</html>
