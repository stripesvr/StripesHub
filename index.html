<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StripesVR Homepage</title>
    <style>
        :root {
            --beat-glow: 0px;
            --beat-color-pulse: #0d0d11;
        }

        body {
            background-color: var(--beat-color-pulse);
            background-image: radial-gradient(circle at center, rgba(255, 30, 30, 0.15) 0%, transparent 80%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            overflow-x: hidden;
            position: relative;
        }

        canvas#lightning-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        .main-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: blur(20px);
            transition: filter 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
            position: relative;
            z-index: 2;
        }

        .main-content.active {
            filter: blur(0px);
            pointer-events: auto;
        }

        .enter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(13, 13, 17, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .enter-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .enter-text {
            font-size: 2rem;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.9), 
                         0 0 30px rgba(255, 51, 51, 0.5);
            animation: pulseText 2s infinite ease-in-out;
        }

        @keyframes pulseText {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border: 5px solid #ff1111;
            box-shadow: 0 0 calc(20px + var(--beat-glow)) rgba(255, 10, 10, 0.6);
            margin-bottom: 20px;
            border-radius: 50%;
        }

        .title-container {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .typewriter-text {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 calc(15px + var(--beat-glow)) rgba(255, 10, 10, 0.8), 
                         0 0 calc(30px + var(--beat-glow)) rgba(255, 0, 0, 0.5);
            letter-spacing: 2px;
            border-right: 3px solid #ff1111;
            white-space: nowrap;
            background: transparent;
            padding-right: 4px;
            animation: blink 0.75s step-end infinite;
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: #ff1111; }
        }

        .links-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .card-link {
            background: linear-gradient(135deg, #16161f 0%, #1f1f2e 100%);
            border: 1px solid #33334d;
            border-radius: 12px;
            padding: 15px 20px;
            text-decoration: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            transition: all 0.1s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card-link:hover {
            transform: translateY(-3px);
            border-color: #ff1111;
            box-shadow: 0 6px 25px rgba(255, 10, 10, 0.5);
        }

        .btn-name {
            font-size: 1.25rem;
            font-weight: bold;
            color: #ff3333;
            margin-bottom: 5px;
        }

        .btn-description {
            font-size: 0.9rem;
            color: #b0b0bc;
            line-height: 1.4;
        }

        .counter-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }

        .counter-label {
            font-size: 1rem;
            color: #ff1111;
            text-shadow: 0 0 10px rgba(255, 11, 11, 0.6);
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .counter-digits {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffffff;
            font-family: monospace;
            letter-spacing: 4px;
            text-shadow: 0 0 calc(10px + var(--beat-glow)) rgba(255, 10, 10, 0.8);
        }
    </style>
</head>
<body>

    <canvas id="lightning-canvas"></canvas>
    <audio id="bg-audio" crossorigin="anonymous"></audio>

    <div class="enter-overlay" id="overlay-screen">
        <div class="enter-text" id="enter-status">Click to Enter...</div>
    </div>

    <div class="main-content" id="site-content">
        <img src="151.png" alt="StripesVR Profile Picture" class="profile-pic">

        <div class="title-container">
            <div class="typewriter-text" id="typewriter"></div>
        </div>

        <div class="links-container">
            <a href="frida.html" class="card-link">
                <span class="btn-name">Frida Tools</span>
                <span class="btn-description">Needed For Every Mod In Here!</span>
            </a>
        
            <a href="cyber.html" class="card-link">
                <span class="btn-name">Cyber.exe Tutorial</span>
                <span class="btn-description">All Of The Downloads And Links Needed For The Cyber.exe Mod Menu</span>
            </a>

            <a href="n5.html" class="card-link">
                <span class="btn-name">N5 Menu Tutorial</span>
                <span class="btn-description">All The Downloads Needed For The N5 Modding Tutorial</span>
            </a>

            <a href="standy.html" class="card-link">
                <span class="btn-name">Standy Mod</span>
                <span class="btn-description">Download N Stuff For Standy Mod Works For Every Game!</span>
            </a>
        </div>

        <div class="counter-container">
            <div class="counter-label"></div>
            <div class="counter-digits" id="view-counter"0</div>
        </div>
    </div>

    <script>
        const textArray = ["StripesVR"];
        let textIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typeSpeed = 150;  
        const eraseSpeed = 100; 
        const delayBetween = 2500; 
        const typewriterElement = document.getElementById("typewriter");

        function type() {
            const currentText = textArray[textIndex];
            if (isDeleting) {
                typewriterElement.textContent = currentText.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typewriterElement.textContent = currentText.substring(0, charIndex + 1);
                charIndex++;
            }

            let nextActionSpeed = isDeleting ? eraseSpeed : typeSpeed;

            if (!isDeleting && charIndex === currentText.length) {
                nextActionSpeed = delayBetween; 
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                nextActionSpeed = 500; 
            }
            setTimeout(type, nextActionSpeed);
        }

        const canvas = document.getElementById('lightning-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let lightningOpacity = 0;
        let activeStrikes = [];

        function createLightningPath(startX, startY, endY, segments) {
            let path = [{x: startX, y: startY}];
            let currentX = startX;
            let currentY = startY;
            let segmentHeight = (endY - startY) / segments;

            for (let i = 0; i < segments; i++) {
                currentY += segmentHeight;
                let deviation = (Math.random() - 0.5) * 110; 
                currentX += deviation;
                path.push({x: currentX, y: currentY});
            }
            return path;
        }

        function drawLightning(path, width, glowSize, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.shadowBlur = glowSize;
            ctx.shadowColor = '#ff0000';
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            ctx.beginPath();
            ctx.moveTo(path[0].x, path[0].y);
            for (let i = 1; i < path.length; i++) {
                ctx.lineTo(path[i].x, path[i].y);
            }
            ctx.stroke();
        }

        function triggerLightningStrike() {
            activeStrikes = [];
            let totalStrikes = Math.floor(Math.random() * 3) + 2; 

            for (let i = 0; i < totalStrikes; i++) {
                let startX = Math.random() * canvas.width;
                let path = createLightningPath(startX, 0, canvas.height, 10);
                activeStrikes.push(path);
            }
            lightningOpacity = 1.0; 
        }

        let audioCtx, analyser, dataArray, sourceNode;
        let isPlaying = false;
        const audio = document.getElementById('bg-audio');
        
        const songUrl = 'jane.mp3';

        let bassHistory = [];
        const historySize = 20; 
        let lastStrikeTime = 0;

        function setupAndPlayAudio() {
            try {
                // Instantly define source source before async actions to appease browsers
                audio.src = songUrl;
                audio.loop = true;
                audio.crossOrigin = "anonymous";

                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContextClass();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 64; 
                
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                sourceNode = audioCtx.createMediaElementSource(audio);
                sourceNode.connect(analyser);
                analyser.connect(audioCtx.destination);

                // Force context awake on physical click gesture
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                audio.currentTime = 7;

                let playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        isPlaying = true;
                        animateDance();
                    }).catch(err => {
                        console.error("Playback failed directly:", err);
                        // Fallback attempt without tracking parameters if blocked
                        audio.src = 'jane.mp3';
                        audio.play().then(() => { isPlaying = true; animateDance(); });
                    });
                }

            } catch (err) {
                console.error("Audio initialization glitch:", err);
            }
        }

        function animateDance() {
            requestAnimationFrame(animateDance);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!isPlaying) return;

            analyser.getByteFrequencyData(dataArray);
            let bassValue = (dataArray[0] + dataArray[1] + dataArray[2] + dataArray[3]) / 4;

            let sum = 0;
            for (let i = 0; i < bassHistory.length; i++) {
                sum += bassHistory[i];
            }
            let bassAverage = bassHistory.length > 0 ? sum / bassHistory.length : 120;

            bassHistory.push(bassValue);
            if (bassHistory.length > historySize) {
                bassHistory.shift();
            }

            let currentTime = Date.now();
            let timeSinceLastStrike = currentTime - lastStrikeTime;

            if ((bassValue > bassAverage * 1.04 && timeSinceLastStrike > 180) || (bassValue >= 240 && timeSinceLastStrike > 320)) {
                triggerLightningStrike();
                lastStrikeTime = currentTime;
            }

            if (lightningOpacity > 0) {
                ctx.globalAlpha = lightningOpacity;
                activeStrikes.forEach(path => {
                    drawLightning(path, 5, 35, '#ff3333');
                    drawLightning(path, 1.5, 5, '#ffffff');
                });
                lightningOpacity *= 0.75; 
                if (lightningOpacity < 0.01) lightningOpacity = 0;
            }

            let normalized = bassValue / 255;
            let glowIntensity = normalized * 50; 
            let redShift = Math.floor(13 + (lightningOpacity * 35)); 
            let colorPulse = `rgb(${redShift}, 13, 17)`;

            document.documentElement.style.setProperty('--beat-glow', `${glowIntensity}px`);
            document.documentElement.style.setProperty('--beat-color-pulse', colorPulse);
        }

        function updateCounter() {
            const counterElement = document.getElementById('view-counter');
            const workspace = 'stripesvr_hub';
            const key = 'main_visits';

            fetch(`https://api.counterapi.dev/v1/${workspace}/${key}/up`)
                .then(response => response.json())
                .then(data => {
                    if (data && data.count) {
                        // Hardcode a base offset value if you want to recover lost counts
                        // e.g., Let's assume you had 4,500 views previously:
                        const trueCount = data.count + 0; 
                        counterElement.textContent = String(trueCount).padStart(6, '0');
                    }
                })
                .catch(error => {
                    console.error('Counter API error:', error);
                    counterElement.textContent = "000450";
                });
        }

        const overlay = document.getElementById('overlay-screen');
        const siteContent = document.getElementById('site-content');
        const enterStatus = document.getElementById('enter-status');

        overlay.addEventListener('click', () => {
            enterStatus.textContent = "Loading Track...";
            overlay.classList.add('hidden');
            siteContent.classList.add('active');

            setupAndPlayAudio();
            updateCounter();
        });

        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(type, 500);
        });
    </script>
</body>
</html>
