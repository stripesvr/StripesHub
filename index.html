<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StripesVR Homepage</title>
    <style>
        :root {
            --beat-glow: 0px;
            --beat-scale: 1;
            --beat-color-pulse: #0d0d11;
            --flash-intensity: 0%;
        }

        body {
            background-color: var(--beat-color-pulse);
            background-image: 
                linear-gradient(rgba(255, 0, 0, var(--flash-intensity)), rgba(0, 0, 0, 0)),
                radial-gradient(circle at center, rgba(255, 30, 30, 0.4) 0%, transparent 80%);
            background-blend-mode: screen;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            transition: background-color 0.01s linear;
            overflow-x: hidden;
        }

        .main-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: blur(20px);
            transition: filter 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
        }

        .main-content.active {
            filter: blur(0px);
            pointer-events: auto;
        }

        .enter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(13, 13, 17, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .enter-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .enter-text {
            font-size: 2rem;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.9), 
                         0 0 30px rgba(255, 51, 51, 0.5);
            animation: pulseText 2s infinite ease-in-out;
        }

        @keyframes pulseText {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border: 5px solid #ff1111;
            box-shadow: 0 0 calc(30px + var(--beat-glow)) rgba(255, 10, 10, 0.9);
            margin-bottom: 20px;
            transform: scale(var(--beat-scale));
            transition: transform 0.01s linear, box-shadow 0.01s linear;
        }

        .main-content.active .profile-pic {
            animation: borderDance 0.15s infinite alternate linear;
        }

        @keyframes borderDance {
            0% { border-radius: 50% 50% 50% 50%; }
            33% { border-radius: 35% 65% 38% 62% / 62% 40% 60% 38%; }
            66% { border-radius: 65% 35% 60% 40% / 38% 62% 38% 62%; }
            100% { border-radius: 40% 60% 35% 65% / 60% 40% 60% 40%; }
        }

        .title-container {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .typewriter-text {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 calc(20px + var(--beat-glow)) rgba(255, 10, 10, 1), 
                         0 0 calc(40px + (var(--beat-glow) * 2)) rgba(255, 0, 0, 0.8);
            letter-spacing: 2px;
            border-right: 3px solid #ff1111;
            white-space: nowrap;
            background: transparent;
            padding-right: 4px;
            animation: blink 0.75s step-end infinite;
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: #ff1111; }
        }

        .links-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .card-link {
            background: linear-gradient(135deg, #16161f 0%, #1f1f2e 100%);
            border: 1px solid #33334d;
            border-radius: 12px;
            padding: 15px 20px;
            text-decoration: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            transform: scale(calc(1 + (var(--beat-scale) - 1) * 0.3));
            transition: all 0.1s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card-link:hover {
            transform: translateY(-3px) scale(1.03);
            border-color: #ff1111;
            box-shadow: 0 6px 25px rgba(255, 10, 10, 0.5);
        }

        .btn-name {
            font-size: 1.25rem;
            font-weight: bold;
            color: #ff3333;
            margin-bottom: 5px;
        }

        .btn-description {
            font-size: 0.9rem;
            color: #b0b0bc;
            line-height: 1.4;
        }

        .counter-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }

        .counter-label {
            font-size: 1rem;
            color: #ff1111;
            text-shadow: 0 0 10px rgba(255, 11, 11, 0.6);
            margin-bottom: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <audio id="bg-audio" crossorigin="anonymous"></audio>

    <div class="enter-overlay" id="overlay-screen">
        <div class="enter-text" id="enter-status">Click to Enter...</div>
    </div>

    <div class="main-content" id="site-content">
        <img src="151.png" alt="StripesVR Profile Picture" class="profile-pic">

        <div class="title-container">
            <div class="typewriter-text" id="typewriter"></div>
        </div>

        <div class="links-container">
            <a href="frida.html" class="card-link">
                <span class="btn-name">Frida Tools</span>
                <span class="btn-description">Needed For Every Mod In Here!</span>
            </a>
        
            <a href="cyber.html" class="card-link">
                <span class="btn-name">Cyber.exe Tutorial</span>
                <span class="btn-description">All Of The Downloads And Links Needed For The Cyber.exe Mod Menu</span>
            </a>

            <a href="n5.html" class="card-link">
                <span class="btn-name">N5 Menu Tutorial</span>
                <span class="btn-description">All The Downloads Needed For The N5 Modding Tutorial</span>
            </a>
        </div>

        <div class="counter-container">
            <div class="counter-label"></div>
            <iframe src="https://404city.neocities" 
                    width="0" 
                    height="0" 
                    frameborder="0" 
                    scrolling="no" 
                    style="display: none">
            </iframe>
        </div>
    </div>

    <script>
        const textArray = ["StripesVR"];
        let textIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typeSpeed = 150;  
        const eraseSpeed = 100; 
        const delayBetween = 2500; 
        const typewriterElement = document.getElementById("typewriter");

        function type() {
            const currentText = textArray[textIndex];
            if (isDeleting) {
                typewriterElement.textContent = currentText.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typewriterElement.textContent = currentText.substring(0, charIndex + 1);
                charIndex++;
            }

            let nextActionSpeed = isDeleting ? eraseSpeed : typeSpeed;

            if (!isDeleting && charIndex === currentText.length) {
                nextActionSpeed = delayBetween; 
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                nextActionSpeed = 500; 
            }
            setTimeout(type, nextActionSpeed);
        }

        let audioCtx, analyser, dataArray, sourceNode;
        let isPlaying = false;
        const audio = document.getElementById('bg-audio');
        
        const songUrl = 'vyralphonk.mp3?v=' + Date.now();

        function setupAndPlayAudio() {
            try {
                audio.src = songUrl;
                audio.loop = true;

                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContextClass();
                analyser = audioCtx.createAnalyser();
                
                analyser.fftSize = 32; 
                
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                sourceNode = audioCtx.createMediaElementSource(audio);
                sourceNode.connect(analyser);
                analyser.connect(audioCtx.destination);

                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                audio.play().then(() => {
                    isPlaying = true;
                    animateDance();
                }).catch(err => {
                    console.error("Playback failed:", err);
                });

            } catch (err) {
                console.error("Audio pipeline initialization error:", err);
            }
        }

        function animateDance() {
            requestAnimationFrame(animateDance);
            if (!isPlaying) return;

            analyser.getByteFrequencyData(dataArray);
            
            let lowBass = dataArray[1] || 0; 
            let midBass = dataArray[2] || 0;
            let subBass = dataArray[0] || 0;
            let upperMids = dataArray[4] || 0; 
            
            let rawAudioValue = Math.max(subBass, lowBass, midBass, upperMids);
            
            let sensitivityMultiplier = 2.2; 
            let finalValue = Math.min(255, rawAudioValue * sensitivityMultiplier);
            
            let normalized = finalValue / 255;

            let glowIntensity = normalized * 140; 
            let scaleMultiplier = 1 + (normalized * 0.45); 
            
            let redShift = Math.floor(10 + (normalized * 180)); 
            let colorPulse = `rgb(${redShift}, 8, 12)`;

            let flashMix = normalized > 0.65 ? (normalized - 0.65) * 2.5 : 0;

            document.documentElement.style.setProperty('--beat-glow', `${glowIntensity}px`);
            document.documentElement.style.setProperty('--beat-scale', scaleMultiplier);
            document.documentElement.style.setProperty('--beat-color-pulse', colorPulse);
            document.documentElement.style.setProperty('--flash-intensity', `${flashMix}`);
        }

        const overlay = document.getElementById('overlay-screen');
        const siteContent = document.getElementById('site-content');
        const enterStatus = document.getElementById('enter-status');

        overlay.addEventListener('click', () => {
            enterStatus.textContent = "Loading Track...";
            
            overlay.classList.add('hidden');
            siteContent.classList.add('active');

            setupAndPlayAudio();
        });

        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(type, 500);
        });
    </script>
</body>
</html>
